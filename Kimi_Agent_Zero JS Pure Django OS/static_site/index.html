
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthex OS</title>
    <link rel="stylesheet" href="static/css/synthex.css">
</head>
<body class="page-enter">

    <!-- Scanlines Overlay -->
    <div class="scanlines"></div>

    <!-- Boot Overlay -->
    
    <div id="boot-overlay">
        <div class="boot-content">
            <div class="boot-logo">
                <div class="logo-hexagon">
                    <div class="logo-inner">
                        <span class="logo-text">SX</span>
                    </div>
                </div>
                <h1 class="boot-title">SYNTHEX OS</h1>
                <p class="boot-version">v2.0.77 // NEURAL EDITION</p>
            </div>
            <div class="boot-bar-container">
                <div class="boot-bar"></div>
            </div>
            <p class="boot-status">INITIALIZING NEURAL INTERFACE...</p>
        </div>
    </div>
    

    <!-- Main Content -->
    <main class="app-window">
        
<div class="desktop">
    <!-- Floating Particles -->
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
    <div class="particle p7"></div>
    <div class="particle p8"></div>
    <div class="particle p9"></div>
    <div class="particle p10"></div>
    <div class="particle p11"></div>
    <div class="particle p12"></div>

    <!-- Desktop Grid -->
    <div class="desktop-grid">
        <a href="terminal/index.html" class="desktop-icon" data-text="TERMINAL">
            <div class="icon-box">
                <span class="icon-symbol">&gt;_</span>
            </div>
            <span class="icon-label">TERMINAL</span>
        </a>
        <a href="sysmon/index.html" class="desktop-icon" data-text="SYSMON">
            <div class="icon-box">
                <span class="icon-symbol">&#9670;</span>
            </div>
            <span class="icon-label">SYS MONITOR</span>
        </a>
        <a href="media/index.html" class="desktop-icon" data-text="MEDIA">
            <div class="icon-box">
                <span class="icon-symbol">&#9836;</span>
            </div>
            <span class="icon-label">MEDIA</span>
        </a>
        <a href="settings/index.html" class="desktop-icon" data-text="SETTINGS">
            <div class="icon-box">
                <span class="icon-symbol">&#9881;</span>
            </div>
            <span class="icon-label">SETTINGS</span>
        </a>
    </div>

    <!-- Welcome Text -->
    <div class="desktop-welcome">
        <h2 class="welcome-title" data-text="WELCOME, OPERATOR">WELCOME, OPERATOR</h2>
        <p class="welcome-subtitle">SELECT AN APPLICATION</p>
    </div>
</div>

    </main>

    <!-- Taskbar -->
    <nav class="taskbar">
        <a href="index.html" class="taskbar-start">
            <span class="start-icon">&#9776;</span>
            <span class="start-label">SYNTHEX</span>
        </a>
        <div class="taskbar-apps">
            <a href="terminal/index.html" class="taskbar-app " title="Terminal">
                <span class="app-icon">&gt;_</span>
            </a>
            <a href="sysmon/index.html" class="taskbar-app " title="System Monitor">
                <span class="app-icon">&#9670;</span>
            </a>
            <a href="media/index.html" class="taskbar-app " title="Media Player">
                <span class="app-icon">&#9836;</span>
            </a>
            <a href="settings/index.html" class="taskbar-app " title="Settings">
                <span class="app-icon">&#9881;</span>
            </a>
        </div>
        <div class="taskbar-clock">
            <span class="clock-time">11</span>
            <span class="clock-colon">:</span>
            <span class="clock-time">13</span>
        </div>
    </nav>

</body>
</html>
